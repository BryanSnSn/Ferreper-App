<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FerreWeb</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --dark: #0f172a;
            --darker: #020617;
            --bg: #f8fafc;
            --success: #10b981;
            --danger: #ef4444;
        }

        body { 
            margin: 0; 
            background-color: var(--bg); 
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* ------------------------------------------- */
        /* DISEÑO DEL SIDEBAR (MENÚ LATERAL)           */
        /* ------------------------------------------- */
        .sidebar { 
            background-color: var(--dark); 
            min-height: 100vh;
            box-shadow: 4px 0 15px rgba(0,0,0,0.1);
        }

        .nav-link {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 1.25rem 1.5rem;
            width: 100%;
            font-weight: 600;
            border-radius: 12px;
            margin-bottom: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        .nav-link:hover:not(.tab-active) {
            background-color: #1e293b;
            color: #f8fafc;
            transform: translateX(4px);
        }

        .tab-active { 
            background-color: var(--primary); 
            color: white !important; 
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4);
            transform: scale(1.02);
        }

        /* ------------------------------------------- */
        /* TARJETAS DEL BUSCADOR                       */
        /* ------------------------------------------- */
        .search-card {
            background: white;
            border-radius: 1.5rem;
            border: 2px solid transparent;
            padding: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .search-card:hover {
            border-color: var(--primary);
            box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.1);
            transform: translateY(-4px);
        }

        .text-truncate {
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 100%;
        }

        /* ------------------------------------------- */
        /* TABLAS DE DATOS PROFESIONALES               */
        /* ------------------------------------------- */
        .custom-table {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
        }

        .custom-table th {
            background-color: var(--darker);
            color: white;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            padding: 1.25rem 1rem;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .custom-table th:first-child { border-top-left-radius: 1rem; }
        .custom-table th:last-child { border-top-right-radius: 1rem; }

        .custom-table tr {
            transition: all 0.2s ease;
            border-bottom: 1px solid #f1f5f9;
        }

        .custom-table td {
            padding: 1rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .custom-table tr:hover {
            background-color: #f1f5f9;
        }

        /* ------------------------------------------- */
        /* ESTILOS DE FORMULARIOS E INPUTS             */
        /* ------------------------------------------- */
        .input-standard {
            width: 100%;
            padding: 1rem;
            background-color: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 1rem;
            outline: none;
            transition: all 0.3s ease;
            font-weight: 600;
            color: #1e293b;
        }

        .input-standard:focus {
            border-color: var(--primary);
            background-color: white;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .input-disabled {
            background-color: #e2e8f0;
            color: #64748b;
            cursor: not-allowed;
            border-color: #cbd5e1;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            padding: 1.25rem 2rem;
            border-radius: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.3);
            border: none;
            cursor: pointer;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary:hover:not(:disabled) {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* ------------------------------------------- */
        /* UTILIDADES (SCROLL & ANIMACIONES)           */
        /* ------------------------------------------- */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        .toast-enter { animation: slideInRight 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .toast-exit { animation: fadeOut 0.4s ease forwards; }

        /* Custom Dropdown Scrollbar for Autocomplete */
        .custom-dropdown-scroll::-webkit-scrollbar {
            width: 8px;
        }
        .custom-dropdown-scroll::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 8px;
        }
        .custom-dropdown-scroll::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // 1. CONFIGURACIÓN E INICIALIZACIÓN DE FIREBASE
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBbpcyUuv-8BpdN7QXkWLncZ2TXzMe_OFY",
            authDomain: "ferreteria-app-56611.firebaseapp.com",
            projectId: "ferreteria-app-56611",
            storageBucket: "ferreteria-app-56611.firebasestorage.app",
            messagingSenderId: "802919956457",
            appId: "1:802919956457:web:e9b11593e41c62b30d1578"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // Extraer hooks de React
        const { useState, useEffect, useMemo, useRef } = React;

        // ==========================================
        // COMPONENTE SECUNDARIO: TOAST NOTIFICATIONS
        // ==========================================
        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(() => {
                    onClose();
                }, 4000);
                return () => clearTimeout(timer);
            }, [onClose]);

            const bgColor = type === 'success' ? 'bg-emerald-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500';
            const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-triangle' : 'fa-info-circle';

            return (
                <div className={`toast-enter flex items-center gap-3 ${bgColor} text-white px-6 py-4 rounded-2xl shadow-2xl mb-3 border border-white/20`}>
                    <i className={`fas ${icon} text-xl`}></i>
                    <span className="font-bold tracking-wide">{message}</span>
                </div>
            );
        };

        // ==========================================
        // COMPONENTE PRINCIPAL (APP)
        // ==========================================
        function App() {
            // ------------------------------------------
            // ESTADOS GLOBALES Y DE NAVEGACIÓN
            // ------------------------------------------
            const [activeTab, setActiveTab] = useState('vender');
            const [loading, setLoading] = useState(true);
            const [toasts, setToasts] = useState([]);
            
            // ------------------------------------------
            // ESTADOS DE BASE DE DATOS
            // ------------------------------------------
            const [inventory, setInventory] = useState([]);
            const [sales, setSales] = useState([]);
            const [searchQuery, setSearchQuery] = useState(''); // Para el buscador global

            // ------------------------------------------
            // ESTADOS: FORMULARIO DE INVENTARIO
            // ------------------------------------------
            const [editId, setEditId] = useState(null);
            const [fNombre, setFNombre] = useState('');
            const [fCategoria, setFCategoria] = useState('');
            const [fStock, setFStock] = useState('');
            const [fCosto, setFCosto] = useState('');
            const [fVenta, setFVenta] = useState('');

            // ------------------------------------------
            // ESTADOS: FORMULARIO DE VENTA (NUEVO AUTOCOMPLETE)
            // ------------------------------------------
            const [vSearchTerm, setVSearchTerm] = useState(''); // Lo que el usuario escribe
            const [vSelectedId, setVSelectedId] = useState(''); // El ID real del producto seleccionado
            const [vShowDropdown, setVShowDropdown] = useState(false); // Mostrar/ocultar lista
            const [vQty, setVQty] = useState(1);

            // ------------------------------------------
            // LOCKS (CANDADOS ANTI-DUPLICADOS)
            // ------------------------------------------
            const isSavingProductRef = useRef(false);
            const isProcessingSaleRef = useRef(false);
            const [uiSavingProduct, setUiSavingProduct] = useState(false);
            const [uiProcessingSale, setUiProcessingSale] = useState(false);

            // ==========================================
            // SISTEMA DE NOTIFICACIONES (TOASTS)
            // ==========================================
            const addToast = (message, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
            };

            const removeToast = (id) => {
                setToasts(prev => prev.filter(t => t.id !== id));
            };

            // ==========================================
            // SINCRONIZACIÓN CON FIREBASE EN TIEMPO REAL
            // ==========================================
            useEffect(() => {
                // Sincronizar Catálogo de Productos
                const unsubInv = db.collection("productos").onSnapshot(snap => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setInventory(data);
                    setLoading(false);
                }, error => {
                    addToast("Error de conexión: No se pudo cargar el inventario", "error");
                });

                // Sincronizar Historial de Ventas (Límite 300 para no sobrecargar)
                const unsubSales = db.collection("ventas")
                    .orderBy("fecha", "desc")
                    .limit(300)
                    .onSnapshot(snap => {
                        const data = snap.docs.map(doc => {
                            const dateObj = doc.data().fecha?.toDate();
                            return { 
                                id: doc.id, 
                                ...doc.data(),
                                timestamp: dateObj ? dateObj.toLocaleString() : 'Procesando Fecha...',
                                rawDate: dateObj || new Date(0)
                            };
                        });
                        setSales(data);
                    }, error => {
                        addToast("Error de conexión: No se pudo cargar el historial", "error");
                    });

                // Cleanup listeners on unmount
                return () => { 
                    unsubInv(); 
                    unsubSales(); 
                };
            }, []);

            // ==========================================
            // UTILIDADES Y FORMATEO
            // ==========================================
            const formatGs = (val) => {
                return new Intl.NumberFormat('es-PY', { 
                    style: 'currency', 
                    currency: 'PYG',
                    maximumFractionDigits: 0 
                }).format(val || 0).replace('PYG', 'Gs.');
            };

            const cleanValue = (val) => {
                if (!val) return 0;
                return parseFloat(String(val).replace(/[^\d.]/g, "")) || 0;
            };

            // ==========================================
            // LÓGICA: GENERADOR AUTOMÁTICO DE CÓDIGOS ÚNICOS
            // ==========================================
            const generateNextCode = () => {
                if (!inventory || inventory.length === 0) return "001";
                let max = 0;
                inventory.forEach(p => {
                    const num = parseInt(p.codigo, 10);
                    if (!isNaN(num) && num > max) {
                        max = num;
                    }
                });
                return String(max + 1).padStart(3, '0');
            };

            // ==========================================
            // LÓGICA: CÁLCULOS DE CAJA (DÍA VS HISTORIAL)
            // ==========================================
            const salesHoy = useMemo(() => {
                const inicioDia = new Date();
                inicioDia.setHours(0, 0, 0, 0); // Desde las 00:00 de hoy
                return sales.filter(s => s.rawDate >= inicioDia);
            }, [sales]);

            const resumenHoy = useMemo(() => {
                return salesHoy.reduce((acc, s) => ({
                    total: acc.total + (s.total || 0),
                    ganancia: acc.ganancia + (s.ganancia || 0)
                }), { total: 0, ganancia: 0 });
            }, [salesHoy]);

            // ==========================================
            // GESTIÓN DE INVENTARIO (CRUD + CSV)
            // ==========================================
            const resetForm = () => {
                setEditId(null);
                setFNombre('');
                setFCategoria('');
                setFStock('');
                setFCosto('');
                setFVenta('');
            };

            const handleSaveProduct = async (e) => {
                e.preventDefault();
                
                // CANDADO: Evitar doble submit rápido
                if (isSavingProductRef.current) return;
                isSavingProductRef.current = true;
                setUiSavingProduct(true);

                // Asignar código: Mantener el actual si edita, crear uno nuevo si es alta
                const finalCodigo = editId ? inventory.find(p => p.id === editId)?.codigo : generateNextCode();

                const productData = {
                    codigo: finalCodigo,
                    nombre: String(fNombre).trim(),
                    categoria: String(fCategoria).trim() || 'General',
                    stock: parseInt(fStock) || 0,
                    costo: cleanValue(fCosto),
                    venta: cleanValue(fVenta)
                };

                try {
                    if (editId) {
                        await db.collection("productos").doc(editId).update(productData);
                        addToast("Artículo actualizado con éxito.", "success");
                    } else {
                        await db.collection("productos").add(productData);
                        addToast(`Artículo añadido (Código: ${finalCodigo}).`, "success");
                    }
                    resetForm();
                } catch (err) {
                    addToast("Fallo al guardar en la base de datos.", "error");
                } finally {
                    isSavingProductRef.current = false;
                    setUiSavingProduct(false);
                }
            };

            const handleEditEntry = (p) => {
                setEditId(p.id);
                setFNombre(p.nombre || '');
                setFCategoria(p.categoria || '');
                setFStock(p.stock || 0);
                setFCosto(p.costo || 0);
                setFVenta(p.venta || 0);
                window.scrollTo({ top: 0, behavior: 'smooth' });
                addToast("Modo edición activado.", "info");
            };

            const handleDeleteEntry = async (id, nombre) => {
                if (confirm(`¿Eliminar permanentemente el artículo "${nombre}"?`)) {
                    try {
                        await db.collection("productos").doc(id).delete();
                        addToast(`Artículo eliminado correctamente.`, "success");
                    } catch (error) {
                        addToast(`Error al intentar eliminar el artículo.`, "error");
                    }
                }
            };

            const handleBulkUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                addToast("Analizando archivo CSV...", "info");
                const reader = new FileReader();
                
                reader.onload = async (evt) => {
                    try {
                        const lines = evt.target.result.split('\n');
                        const batch = db.batch();
                        const separator = lines[0].includes(';') ? ';' : ',';

                        let count = 0;
                        lines.slice(1).forEach(line => {
                            if (!line.trim()) return; // Ignorar líneas en blanco
                            const cols = line.split(separator);
                            if (cols.length >= 5) {
                                const ref = db.collection('productos').doc();
                                batch.set(ref, {
                                    codigo: cols[0]?.replace(/"/g, '').trim() || "",
                                    nombre: cols[1]?.replace(/"/g, '').trim() || "Sin Descripción",
                                    stock: parseInt(cols[2]) || 0,
                                    costo: cleanValue(cols[3]),
                                    venta: cleanValue(cols[4]),
                                    categoria: cols[5]?.replace(/"/g, '').trim() || "General"
                                });
                                count++;
                            }
                        });
                        
                        await batch.commit();
                        addToast(`Importación exitosa: Se añadieron ${count} artículos.`, "success");
                        e.target.value = null; // Resetear el input file
                    } catch (err) {
                        addToast("Error al procesar el archivo. Verifique el formato.", "error");
                    }
                };
                reader.readAsText(file);
            };

            // ==========================================
            // LÓGICA DE AUTOCOMPLETADO PARA VENTAS (NUEVO)
            // ==========================================
            // Filtrar productos para el buscador de ventas basado en lo que escribe el usuario
            const filteredAutocomplete = useMemo(() => {
                if (!vSearchTerm) return []; // Si está vacío, no mostrar nada
                return inventory.filter(p => 
                    p.nombre?.toLowerCase().includes(vSearchTerm.toLowerCase()) || 
                    p.codigo?.includes(vSearchTerm)
                ).sort((a,b) => a.nombre.localeCompare(b.nombre));
            }, [inventory, vSearchTerm]);

            // ==========================================
            // LÓGICA DE VENTAS (ANTI-DUPLICADOS + BATCH)
            // ==========================================
            const handleProcessSale = async (e) => {
                e.preventDefault();
                
                // 1. CANDADO: Evitar múltiples envíos si el servidor está lento
                if (isProcessingSaleRef.current) {
                    return;
                }
                
                // 2. VALIDACIONES
                if (!vSelectedId) {
                    return addToast("Por favor, seleccione un producto de la lista desplegable.", "error");
                }
                const prod = inventory.find(x => x.id === vSelectedId);
                const quantity = parseInt(vQty);
                
                if (!prod) {
                    return addToast("El producto seleccionado no existe.", "error");
                }
                if (prod.stock < quantity) {
                    return addToast(`Stock insuficiente. Quedan ${prod.stock} unidades.`, "error");
                }

                // 3. BLOQUEAR INTERFAZ
                isProcessingSaleRef.current = true;
                setUiProcessingSale(true);

                try {
                    // 4. TRANSACCIÓN ATÓMICA DE FIREBASE (BATCH)
                    // Garantiza que o se hace todo (venta + resta de stock) o no se hace nada.
                    const batch = db.batch();
                    
                    const ventaRef = db.collection("ventas").doc(); 
                    const prodRef = db.collection("productos").doc(vSelectedId);

                    batch.set(ventaRef, {
                        producto: prod.nombre,
                        cantidad: quantity,
                        total: prod.venta * quantity,
                        ganancia: (prod.venta - prod.costo) * quantity,
                        fecha: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    batch.update(prodRef, {
                        stock: prod.stock - quantity
                    });

                    await batch.commit();
                    
                    // 5. LIMPIEZA POST-VENTA
                    addToast(`Venta Registrada: ${prod.nombre} (x${quantity})`, "success");
                    setVSelectedId('');
                    setVSearchTerm(''); // Limpiar el input autocompletable
                    setVQty(1);
                    
                } catch (err) {
                    console.error("Error en Batch:", err);
                    addToast("Error crítico al registrar la venta. Intente nuevamente.", "error");
                } finally {
                    // 6. LIBERAR CANDADOS
                    isProcessingSaleRef.current = false;
                    setUiProcessingSale(false);
                }
            };

            // ==========================================
            // LÓGICA: FILTRO DEL BUSCADOR GLOBAL
            // ==========================================
            const filteredGlobalSearch = inventory.filter(p => 
                p.nombre?.toLowerCase().includes(searchQuery.toLowerCase()) || 
                p.codigo?.includes(searchQuery)
            ).sort((a,b) => a.nombre.localeCompare(b.nombre));

            return (
                <div className="min-h-screen flex flex-col md:flex-row relative">
                    
                    {/* =========================================
                        CONTENEDOR DE NOTIFICACIONES (TOASTS)
                    ========================================= */}
                    <div className="fixed bottom-6 right-6 z-50 flex flex-col items-end pointer-events-none">
                        {toasts.map(toast => (
                            <Toast key={toast.id} message={toast.message} type={toast.type} onClose={() => removeToast(toast.id)} />
                        ))}
                    </div>

                    {/* =========================================
                        MENÚ LATERAL (SIDEBAR)
                    ========================================= */}
                    <aside className="w-full md:w-[280px] sidebar p-6 flex flex-col z-30">
                        <div className="text-white font-black text-2xl pb-8 border-b border-slate-700/50 mb-8 flex items-center gap-4">
                            <div className="bg-blue-600 p-3 rounded-2xl shadow-lg shadow-blue-500/20">
                                <i className="fas fa-hammer text-white text-xl"></i>
                            </div>
                            <span className="tracking-tight">FerreWeb ©</span>
                        </div>
                        
                        <nav className="space-y-2 flex-1">
                            <p className="text-[11px] font-black text-slate-500 uppercase tracking-widest px-4 mb-4">Caja & Reportes</p>
                            <button onClick={() => setActiveTab('vender')} className={`nav-link ${activeTab==='vender' ? 'tab-active' : ''}`}>
                                <i className="fas fa-cash-register w-6 text-center text-lg"></i> 
                                <span>Ventas</span>
                            </button>
                            <button onClick={() => setActiveTab('historial')} className={`nav-link ${activeTab==='historial' ? 'tab-active' : ''}`}>
                                <i className="fas fa-chart-line w-6 text-center text-lg"></i> 
                                <span>Histórico</span>
                            </button>
                            
                            <div className="my-6 border-b border-slate-800"></div>

                            <p className="text-[11px] font-black text-slate-500 uppercase tracking-widest px-4 mb-4">Logística</p>
                            <button onClick={() => setActiveTab('inventario')} className={`nav-link ${activeTab==='inventario' ? 'tab-active' : ''}`}>
                                <i className="fas fa-boxes-stacked w-6 text-center text-lg"></i> 
                                <span>Inventario</span>
                            </button>
                            <button onClick={() => setActiveTab('buscador')} className={`nav-link ${activeTab==='buscador' ? 'tab-active' : ''}`}>
                                <i className="fas fa-search w-6 text-center text-lg"></i> 
                                <span>Buscador</span>
                            </button>
                        </nav>

                        <div className="mt-auto pt-8 border-t border-slate-700/50">
                             <div className={`flex items-center justify-center gap-3 text-xs font-black p-4 rounded-2xl bg-slate-900/50 ${loading ? 'text-yellow-500' : 'text-emerald-400'}`}>
                                <span className={`w-2.5 h-2.5 rounded-full ${loading ? 'bg-yellow-500 animate-pulse' : 'bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.5)]'}`}></span>
                                {loading ? 'Sincronizando Nube...' : 'Sistema Conectado'}
                             </div>
                        </div>
                    </aside>

                    {/* =========================================
                        ÁREA PRINCIPAL DE CONTENIDO (MAIN)
                    ========================================= */}
                    <main className="flex-1 p-6 md:p-10 overflow-y-auto hide-scroll">
                        <div className="max-w-7xl mx-auto">
                            
                            {/* --------------------------------------
                                PESTAÑA: CIERRE DE CAJA (VENTAS)
                            --------------------------------------- */}
                            {activeTab === 'vender' && (
                                <div className="space-y-8 animate-in fade-in duration-500">
                                    <header className="mb-10">
                                        <h2 className="text-4xl font-black text-slate-900 tracking-tight">Cierre de Caja</h2>
                                        <p className="text-slate-500 font-medium mt-1">Gestión de operaciones correspondientes al día de hoy</p>
                                    </header>

                                    {/* Indicadores Diarios */}
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="bg-white p-8 rounded-3xl border border-blue-100 shadow-sm border-l-[12px] border-l-blue-600 relative overflow-hidden">
                                            <i className="fas fa-money-bill-wave absolute right-6 top-1/2 -translate-y-1/2 text-blue-50 text-[100px]"></i>
                                            <div className="relative z-10">
                                                <p className="text-slate-400 text-sm font-black uppercase tracking-widest mb-2">Recaudación Bruta (Hoy)</p>
                                                <h2 className="text-5xl font-black text-blue-600 tracking-tighter">{formatGs(resumenHoy.total)}</h2>
                                            </div>
                                        </div>
                                        <div className="bg-white p-8 rounded-3xl border border-emerald-100 shadow-sm border-l-[12px] border-l-emerald-500 relative overflow-hidden">
                                            <i className="fas fa-piggy-bank absolute right-6 top-1/2 -translate-y-1/2 text-emerald-50 text-[100px]"></i>
                                            <div className="relative z-10">
                                                <p className="text-slate-400 text-sm font-black uppercase tracking-widest mb-2">Utilidad Estimada (Hoy)</p>
                                                <h2 className="text-5xl font-black text-emerald-500 tracking-tighter">{formatGs(resumenHoy.ganancia)}</h2>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    {/* FORMULARIO DE VENTA CON AUTOCOMPLETADO */}
                                    <form onSubmit={handleProcessSale} className="bg-white p-10 rounded-[2.5rem] border border-slate-200 shadow-xl flex flex-col md:flex-row gap-6 items-start relative overflow-visible">
                                        <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 to-indigo-500 rounded-t-[2.5rem]"></div>
                                        
                                        <div className="flex-1 w-full relative">
                                            <label className="text-xs font-black text-slate-500 ml-2 uppercase tracking-widest mb-2 block">Buscador de Artículos</label>
                                            
                                            {/* Input Autocompletable */}
                                            <div className="relative">
                                                <i className="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                                <input 
                                                    type="text" 
                                                    placeholder="Escriba nombre o código del producto..."
                                                    value={vSearchTerm}
                                                    onChange={(e) => {
                                                        setVSearchTerm(e.target.value);
                                                        setVSelectedId(''); // Limpiar selección si el texto cambia
                                                        setVShowDropdown(true);
                                                    }}
                                                    onFocus={() => setVShowDropdown(true)}
                                                    className="input-standard pl-12 text-lg font-bold text-slate-700"
                                                />
                                            </div>

                                            {/* Menú Flotante de Resultados */}
                                            {vShowDropdown && vSearchTerm && (
                                                <div className="absolute z-50 w-full mt-2 bg-white border-2 border-slate-200 rounded-2xl shadow-2xl max-h-64 overflow-y-auto custom-dropdown-scroll">
                                                    {filteredAutocomplete.length === 0 ? (
                                                        <div className="p-4 text-center text-slate-500 font-bold italic">No se encontraron productos...</div>
                                                    ) : (
                                                        filteredAutocomplete.map(p => (
                                                            <div 
                                                                key={p.id}
                                                                onMouseDown={(e) => e.preventDefault()} // Previene que el input pierda foco antes del click
                                                                onClick={() => {
                                                                    setVSelectedId(p.id);
                                                                    setVSearchTerm(`${p.codigo} - ${p.nombre}`); // Mostrar en input
                                                                    setVShowDropdown(false);
                                                                }}
                                                                className={`p-4 border-b border-slate-100 last:border-b-0 cursor-pointer hover:bg-blue-50 transition-colors flex justify-between items-center ${p.stock <= 0 ? 'opacity-50 bg-red-50' : ''}`}
                                                            >
                                                                <div>
                                                                    <div className="flex items-center gap-2 mb-1">
                                                                        <span className="bg-slate-200 text-slate-600 px-2 py-0.5 rounded font-mono text-[10px] font-bold">{p.codigo}</span>
                                                                        <span className="font-black text-slate-800 uppercase">{p.nombre}</span>
                                                                    </div>
                                                                    <div className={`text-xs font-bold ${p.stock > 0 ? 'text-emerald-500' : 'text-red-500'}`}>
                                                                        {p.stock > 0 ? `Stock Disponible: ${p.stock}` : 'AGOTADO'}
                                                                    </div>
                                                                </div>
                                                                <div className="text-right">
                                                                    <span className="block font-black text-blue-600 text-lg">{formatGs(p.venta)}</span>
                                                                </div>
                                                            </div>
                                                        ))
                                                    )}
                                                </div>
                                            )}
                                        </div>

                                        <div className="w-full md:w-40">
                                            <label className="text-xs font-black text-slate-500 ml-2 uppercase tracking-widest mb-2 block">Cantidad</label>
                                            <input type="number" min="1" required value={vQty} onChange={e => setVQty(e.target.value)} className="input-standard text-2xl font-black text-center text-slate-800" />
                                        </div>

                                        <button 
                                            disabled={uiProcessingSale || !vSelectedId} 
                                            className="w-full md:w-auto btn-primary py-5 px-12 text-lg disabled:opacity-50"
                                        >
                                            {uiProcessingSale ? (
                                                <><i className="fas fa-spinner fa-spin"></i> Procesando...</>
                                            ) : (
                                                <><i className="fas fa-cart-plus"></i> Cobrar</>
                                            )}
                                        </button>
                                    </form>

                                    {/* Tabla del Cierre Diario */}
                                    <div className="bg-white rounded-[2rem] border border-slate-200 overflow-hidden shadow-sm mt-8">
                                        <div className="p-8 bg-slate-50/50 border-b border-slate-100 flex justify-between items-center">
                                            <div className="flex items-center gap-3">
                                                <div className="bg-blue-100 p-2 rounded-lg text-blue-600"><i className="fas fa-list-check"></i></div>
                                                <h3 className="font-black text-slate-700 uppercase tracking-widest">Movimientos Registrados</h3>
                                            </div>
                                            <span className="text-xs font-black text-slate-500 bg-white px-4 py-2 border rounded-xl shadow-sm uppercase tracking-widest">
                                                Fecha: {new Date().toLocaleDateString()}
                                            </span>
                                        </div>
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left text-sm custom-table">
                                                <thead className="bg-white border-b border-slate-100">
                                                    <tr>
                                                        <th className="bg-slate-100 text-slate-500">Descripción del Artículo Vendido</th>
                                                        <th className="bg-slate-100 text-slate-500 text-center">Unidades</th>
                                                        <th className="bg-slate-100 text-slate-500 text-right">Monto Facturado</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {salesHoy.length === 0 ? (
                                                        <tr><td colSpan="3" className="p-16 text-center text-slate-400 font-medium">Aún no se ha realizado ninguna operación en caja el día de hoy.</td></tr>
                                                    ) : (
                                                        salesHoy.map(s => (
                                                            <tr key={s.id}>
                                                                <td className="p-6 font-bold text-slate-700 uppercase tracking-tight">{s.producto}</td>
                                                                <td className="p-6 text-center">
                                                                    <span className="bg-slate-100 px-4 py-2 rounded-lg font-black text-slate-600 border border-slate-200">
                                                                        x{s.cantidad}
                                                                    </span>
                                                                </td>
                                                                <td className="p-6 text-right font-black text-blue-600 text-2xl tracking-tighter">{formatGs(s.total)}</td>
                                                            </tr>
                                                        ))
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* --------------------------------------
                                VISTA: HISTORIAL MAESTRO
                            --------------------------------------- */}
                            {activeTab === 'historial' && (
                                <div className="space-y-8 animate-in slide-in-from-right duration-500">
                                    <header className="mb-10">
                                        <h2 className="text-4xl font-black text-slate-900 tracking-tight">Historial General</h2>
                                        <p className="text-slate-500 font-medium mt-1">Registro inmutable de todas las operaciones de venta históricas</p>
                                    </header>

                                    <div className="bg-white rounded-[2rem] border border-slate-200 overflow-hidden shadow-xl">
                                        <div className="overflow-x-auto hide-scroll">
                                            <table className="w-full text-left text-sm custom-table min-w-[900px]">
                                                <thead>
                                                    <tr>
                                                        <th>Fecha/Hora</th>
                                                        <th>Detalle</th>
                                                        <th className="text-center">Cantidad</th>
                                                        <th className="text-right">Ingreso Bruto</th>
                                                        <th className="text-right text-emerald-400">Utilidad Neta</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {sales.map(s => (
                                                        <tr key={s.id}>
                                                            <td className="px-6 py-5 text-slate-500 font-mono font-bold text-xs">{s.timestamp}</td>
                                                            <td className="px-6 py-5 font-black uppercase text-slate-800">{s.producto}</td>
                                                            <td className="px-6 py-5 text-center font-bold text-slate-500">{s.cantidad} und.</td>
                                                            <td className="px-6 py-5 text-right font-black text-slate-700 text-lg tracking-tighter">{formatGs(s.total)}</td>
                                                            <td className="px-6 py-5 text-right font-black text-emerald-600 text-lg tracking-tighter">{formatGs(s.ganancia)}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* --------------------------------------
                                VISTA: INVENTARIO CENTRAL (CRUD)
                            --------------------------------------- */}
                            {activeTab === 'inventario' && (
                                <div className="space-y-8 animate-in slide-in-from-bottom duration-500">
                                    <div className="flex flex-col md:flex-row justify-between items-center gap-6 mb-10">
                                        <header>
                                            <h2 className="text-4xl font-black text-slate-900 tracking-tight">Base de Inventario</h2>
                                            <p className="text-slate-500 font-medium mt-1">Añada, edite y controle su catálogo de productos</p>
                                        </header>
                                        
                                        <label className="bg-slate-800 text-white px-8 py-4 rounded-2xl font-black text-sm uppercase tracking-widest cursor-pointer hover:bg-slate-900 flex items-center gap-3 shadow-xl transition-all active:scale-95 border border-slate-700">
                                            <i className="fas fa-file-import text-xl text-emerald-400"></i>
                                            Subir Excel (CSV)
                                            <input type="file" accept=".csv" onChange={handleBulkUpload} className="hidden" />
                                        </label>
                                    </div>

                                    {/* Formulario de Alta de Inventario */}
                                    <form onSubmit={handleSaveProduct} className="bg-white p-10 rounded-[3rem] border border-slate-200 shadow-xl grid grid-cols-1 md:grid-cols-6 gap-6 items-end relative overflow-hidden">
                                        <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-slate-800 to-slate-600 rounded-t-[3rem]"></div>
                                        
                                        <div className="md:col-span-1">
                                            <label className="text-[10px] font-black text-slate-500 ml-2 uppercase tracking-widest mb-2 block">Código Autogenerado</label>
                                            <input 
                                                type="text" 
                                                value={editId ? fCodigo : generateNextCode()} 
                                                disabled 
                                                className="input-standard input-disabled font-mono text-center tracking-widest font-black" 
                                            />
                                        </div>
                                        <div className="md:col-span-2">
                                            <label className="text-[10px] font-black text-slate-500 ml-2 uppercase tracking-widest mb-2 block">Descripción Completa</label>
                                            <input required type="text" value={fNombre} onChange={e => setFNombre(e.target.value)} className="input-standard uppercase font-black text-slate-800" placeholder="                          " />
                                        </div>
                                        <div className="md:col-span-1">
                                            <label className="text-[10px] font-black text-slate-500 ml-2 uppercase tracking-widest mb-2 block">Categoría</label>
                                            <input type="text" value={fCategoria} onChange={e => setFCategoria(e.target.value)} className="input-standard uppercase font-bold placeholder:italic placeholder:font-normal" placeholder="             " />
                                        </div>
                                        <div className="md:col-span-1">
                                            <label className="text-[10px] font-black text-emerald-500 ml-2 uppercase tracking-widest mb-2 block">Stock Físico</label>
                                            <input required type="number" value={fStock} onChange={e => setFStock(e.target.value)} className="input-standard font-black text-center bg-emerald-50/50 border-emerald-100 focus:border-emerald-500" />
                                        </div>
                                        <div className="md:col-span-1"></div> {/* Spacer */}

                                        <div className="md:col-span-2">
                                            <label className="text-[10px] font-black text-slate-500 ml-2 uppercase tracking-widest mb-2 block">Costo Adquisición (Gs)</label>
                                            <div className="relative">
                                                <i className="fas fa-tags absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                                <input required type="number" value={fCosto} onChange={e => setFCosto(e.target.value)} className="input-standard pl-12 font-black text-slate-700" />
                                            </div>
                                        </div>
                                        <div className="md:col-span-2">
                                            <label className="text-[10px] font-black text-blue-500 ml-2 uppercase tracking-widest mb-2 block">Precio Venta Público (Gs)</label>
                                            <div className="relative">
                                                <i className="fas fa-tag absolute left-4 top-1/2 -translate-y-1/2 text-blue-400"></i>
                                                <input required type="number" value={fVenta} onChange={e => setFVenta(e.target.value)} className="input-standard pl-12 font-black text-blue-600 bg-blue-50/30 border-blue-200 focus:border-blue-600" />
                                            </div>
                                        </div>
                                        
                                        <div className="md:col-span-2 flex gap-3 pt-4">
                                            <button disabled={uiSavingProduct} className="btn-primary flex-1 tracking-widest text-xs">
                                                {uiSavingProduct ? 'GUARDANDO...' : editId ? '💾 ACTUALIZAR FICHA' : 'AÑADIR ARTÍCULO'}
                                            </button>
                                            {editId && (
                                                <button type="button" onClick={resetForm} className="bg-slate-200 text-slate-600 px-6 py-4 rounded-xl font-bold hover:bg-slate-300 transition-all text-xs tracking-widest">
                                                    CANCELAR
                                                </button>
                                            )}
                                        </div>
                                    </form>

                                    {/* Tabla Maestra de Inventario */}
                                    <div className="bg-white rounded-[2rem] border border-slate-200 overflow-hidden shadow-sm mt-10">
                                        <div className="overflow-x-auto hide-scroll">
                                            <table className="w-full text-left text-sm custom-table min-w-[1000px]">
                                                <thead>
                                                    <tr>
                                                        <th>Cód.</th>
                                                        <th>Nombre del Artículo</th>
                                                        <th>Rubro</th>
                                                        <th className="text-center">Existencia</th>
                                                        <th className="text-right">Costo Unit.</th>
                                                        <th className="text-right text-blue-300">Precio Venta</th>
                                                        <th className="text-center">Control</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {inventory.sort((a,b) => a.nombre.localeCompare(b.nombre)).map(p => (
                                                        <tr key={p.id}>
                                                            <td className="px-6 py-5 font-mono text-slate-400 text-xs font-bold">{p.codigo}</td>
                                                            <td className="px-6 py-5 font-black uppercase text-slate-800 tracking-tight">{p.nombre}</td>
                                                            <td className="px-6 py-5 text-slate-500 font-bold text-xs uppercase">{p.categoria}</td>
                                                            <td className="px-6 py-5 text-center">
                                                                <div className={`inline-flex items-center gap-2 px-4 py-2 rounded-xl font-black text-xs border ${p.stock < 5 ? 'bg-red-50 text-red-600 border-red-200 shadow-sm' : 'bg-emerald-50 text-emerald-600 border-emerald-200'}`}>
                                                                    {p.stock < 5 && <i className="fas fa-warning animate-pulse"></i>}
                                                                    {p.stock} U.
                                                                </div>
                                                            </td>
                                                            <td className="px-6 py-5 text-right font-bold text-slate-500">{formatGs(p.costo)}</td>
                                                            <td className="px-6 py-5 text-right font-black text-blue-700 text-xl tracking-tighter">{formatGs(p.venta)}</td>
                                                            <td className="px-6 py-5 text-center">
                                                                <div className="flex justify-center gap-2">
                                                                    <button onClick={() => handleEditEntry(p)} className="text-blue-500 bg-white hover:bg-blue-50 border border-slate-200 hover:border-blue-200 p-3 rounded-xl transition-all shadow-sm">
                                                                        <i className="fas fa-edit"></i>
                                                                    </button>
                                                                    <button onClick={() => handleDeleteEntry(p.id, p.nombre)} className="text-red-500 bg-white hover:bg-red-50 border border-slate-200 hover:border-red-200 p-3 rounded-xl transition-all shadow-sm">
                                                                        <i className="fas fa-trash-alt"></i>
                                                                    </button>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* --------------------------------------
                                VISTA 4: BUSCADOR / CATÁLOGO GLOBAL
                            --------------------------------------- */}
                            {activeTab === 'buscador' && (
                                <div className="max-w-5xl mx-auto space-y-12 animate-in zoom-in duration-500 pb-20">
                                    <div className="text-center pt-8 mb-12">
                                        <h2 className="text-6xl font-black text-slate-900 tracking-tighter mb-4">Catálogo Digital</h2>
                                        <p className="text-slate-500 font-bold uppercase text-xs tracking-[0.4em]">Búsqueda ultra-rápida de productos y precios</p>
                                    </div>
                                    
                                    <div className="relative group mx-auto max-w-4xl">
                                        <div className="absolute inset-y-0 left-0 pl-8 flex items-center pointer-events-none">
                                            <i className="fas fa-search text-slate-300 text-3xl group-focus-within:text-blue-500 transition-colors"></i>
                                        </div>
                                        <input 
                                            type="text" 
                                            placeholder="Escriba el nombre, marca o código..." 
                                            value={searchQuery} 
                                            onChange={e => setSearchQuery(e.target.value)} 
                                            className="w-full p-10 pl-24 text-3xl border-4 border-white rounded-[3rem] outline-none focus:border-blue-500 focus:ring-8 ring-blue-500/20 shadow-2xl transition-all font-black placeholder:text-slate-300 text-slate-800" 
                                        />
                                    </div>

                                    {/* Resultados del Buscador Global */}
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-16">
                                        {searchQuery && filteredGlobalSearch.map(p => (
                                            <div key={p.id} className="search-card relative overflow-hidden group">
                                                <div className={`absolute left-0 top-0 bottom-0 w-2 ${p.stock > 0 ? 'bg-emerald-400' : 'bg-red-500'}`}></div>
                                                
                                                <div className="flex-1 min-w-0 pl-4 pr-6">
                                                    <div className="flex items-center gap-3 mb-2">
                                                        <span className="bg-slate-100 text-slate-500 px-3 py-1 rounded-md text-[10px] font-black uppercase tracking-widest border border-slate-200">
                                                            {p.categoria || 'Genérico'}
                                                        </span>
                                                        <span className="text-slate-400 font-mono text-[10px] font-bold">Ref: {p.codigo}</span>
                                                    </div>
                                                    
                                                    <h4 className="text-2xl font-black text-slate-800 uppercase text-truncate" title={p.nombre}>
                                                        {p.nombre}
                                                    </h4>
                                                    
                                                    <div className="flex items-center gap-2 mt-4">
                                                        <div className={`w-3 h-3 rounded-full ${p.stock > 0 ? 'bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.6)]' : 'bg-red-500 animate-pulse shadow-[0_0_10px_rgba(239,68,68,0.6)]'}`}></div>
                                                        <p className={`text-xs font-black uppercase ${p.stock > 0 ? 'text-emerald-600' : 'text-red-500'}`}>
                                                            {p.stock > 0 ? `${p.stock} UNIDADES DISPONIBLES` : 'AGOTADO / SIN STOCK'}
                                                        </p>
                                                    </div>
                                                </div>
                                                
                                                <div className="text-right flex-shrink-0 pl-6 border-l-2 border-slate-100 py-2">
                                                    <p className="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-1">Precio Público</p>
                                                    <p className="text-5xl font-black text-blue-600 tracking-tighter leading-none">{formatGs(p.venta)}</p>
                                                </div>
                                            </div>
                                        ))}
                                        
                                        {!searchQuery && (
                                            <div className="col-span-full py-32 text-center opacity-20 transform scale-90 transition-transform">
                                                <i className="fas fa-barcode text-[150px] text-slate-500 mb-8"></i>
                                                <p className="text-2xl font-black text-slate-600 uppercase tracking-[0.3em]">Esperando consulta...</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
